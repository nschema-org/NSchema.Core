name: NSchema.Core

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Build Pipeline
        run: dotnet run --project build/NSchema.Build/NSchema.Build.csproj -- build
        shell: bash

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: Development
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Deploy Pipeline
        run: dotnet run --project build/NSchema.Build/NSchema.Build.csproj -- deploy
        shell: bash
        env:
          Build__NuGetApiKey: ${{ secrets.NUGET_API_KEY }}
          Build__CommitSha: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
