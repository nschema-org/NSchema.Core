  <!-- Wordmark -->
  <text x="140" y="70" font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="32" font-weight="500" fill="#e2e6f0">NSchema</text>
  <text x="141" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" letter-spacing="1.2" fill="#7a8090">DECLARATIVE DATABASE SCHEMA</text>
