    <rect x="30" y="26" width="26" height="4" rx="2" fill="#6b8fff"/>
    <rect x="58" y="26" width="12" height="4" rx="2" fill="#3a3d4a"/>
    <rect x="30" y="34" width="20" height="4" rx="2" fill="#6b8fff"/>
    <rect x="52" y="34" width="18" height="4" rx="2" fill="#3a3d4a"/>
